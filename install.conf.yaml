- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/:
      glob: true
      path: bash/.*

    ~/.config/kitty: 
      glob: true
      path: kitty/*

    ~/.config/fish/:
      glob: true
      path: fish/*
      create: true

    ~/.config/:
      path: yazi/*
      glob: true

    ~/.gitconfig: .gitconfig

- create:
    - ~/test
    #- ~/downloads
    #- ~/.vim/undo-history

- shell:
  - [git submodule update --init --recursive, Installing submodules]
