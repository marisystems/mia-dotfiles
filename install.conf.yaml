- defaults:
    link:
      relink: true

- link:
    ~/:
      glob: true
      path: bash/.*

    ~/.config/kitty: 
      glob: true
      path: kitty/*

    ~/.config/fish/:
      glob: true
      path: fish/*
      create: true

    ~/.config/yazi:
      path: yazi/*
      glob: true
      create: true

    ~/:
      path: zsh/.*
      glob: true
      exclude: zsh/ohmyzsh

    ~/.oh-my-zsh/custom:
      path: zsh/custom

    ~/.gitconfig: .gitconfig

    ~/.tmux.conf: .tmux.conf

