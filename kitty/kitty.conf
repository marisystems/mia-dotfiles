# cursor
cursor_blink_interval 0
cursor_shape block
cursor_trail 200
cursor_trail_decay 0.1 0.4
cursor_trail_strat_treshold 2

# mouse
mouse_hide_wait 10.0

# misc
hide_window_decorations no
enable_audio_bell no
confirm_os_window_close 0

# shell
shell zsh

# window size
remember_window_size no
initial_window_width 110c
initial_window_height 20c

# font size
font_size 14

# BEGIN_KITTY_THEME
# Hybrid
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="VictorMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
